<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FlexPPT Viewer</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #fff;
    }
    #toolbar {
      background: #2d2d2d;
      padding: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      border-bottom: 1px solid #3f3f3f;
    }
    button {
      background: #4a4a4a;
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background: #5a5a5a; }
    #container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      background: #fff;
    }
    .fullscreen #toolbar { display: none; }
    .fullscreen #container { padding: 0; }
  </style>
  <script src="lib/pptx-browser.min.js"></script>
</head>
<body>

  <div id="toolbar">
    <input type="file" id="file-input" accept=".pptx" />
    <button id="prev-btn">◀ Prev</button>
    <span id="slide-info">Slide 0 / 0</span>
    <button id="next-btn">Next ▶</button>
    <button id="fullscreen-btn">Present 📺</button>
  </div>

  <div id="container">
    <canvas id="slide-canvas"></canvas>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
